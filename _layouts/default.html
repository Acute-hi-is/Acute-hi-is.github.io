<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}ACUTE Research Laboratories</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}ACoUstic and Tactile Engineering — Research Laboratory, University of Iceland{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg-dark:#0D1B2F;--bg-surface:#f5f2ed;--text:#1B1B27;--text-light:#EDE8DF;--accent:#ff8000;--white:#fff;--font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'DM Mono',monospace;--max-w:1200px;--ease:220ms ease}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{font-size:16px;-webkit-font-smoothing:antialiased}body{font-family:var(--font-body);font-size:1rem;line-height:1.75;color:var(--text);background:var(--white)}a{color:inherit;text-decoration:none}ul{list-style:none}img{max-width:100%;display:block}h1,h2,h3,h4{font-family:var(--font-display);font-weight:700;line-height:1.12;letter-spacing:-.02em}.container{max-width:var(--max-w);margin:0 auto;padding:0 2rem}.site-header{position:sticky;top:0;z-index:100;background:var(--bg-dark);border-bottom:3px solid var(--accent)}.site-header__inner{display:flex;align-items:center;justify-content:space-between;height:68px}.site-logo img{height:60px;width:auto;display:block}.site-nav__list{display:flex;gap:2.5rem}.site-nav__link{font-family:var(--font-mono);font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(237,232,223,.5)}.nav-toggle{display:none}.hero{position:relative;min-height:90vh;display:flex;align-items:center;overflow:hidden}.hero__slideshow{position:absolute;inset:0;z-index:0}.hero__slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}.hero__slide.is-active{opacity:1}.hero__slide img{width:100%;height:100%;object-fit:cover}.hero__slide::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,rgba(13,27,47,.95) 0%,rgba(13,27,47,.75) 55%,rgba(13,27,47,.45) 100%)}.hero__inner{position:relative;z-index:1;max-width:var(--max-w);margin:0 auto;padding:0 2rem}.hero__title{font-size:clamp(2.4rem,5.5vw,4.5rem);color:var(--white)}.hero__sub{color:var(--text-light);opacity:.7;max-width:36rem;margin-top:1.2rem}@media(max-width:768px){.nav-toggle{display:block;background:none;border:none;cursor:pointer;padding:.5rem;z-index:101}.nav-toggle span{display:block;width:22px;height:2px;background:var(--white);margin:5px 0}.site-nav{position:fixed;top:0;right:0;bottom:0;width:min(300px,80vw);background:var(--bg-dark);padding:5rem 2rem 2rem;transform:translateX(100%);transition:transform .35s ease;z-index:100}.site-nav.is-open{transform:translateX(0)}.site-nav__list{flex-direction:column;gap:1.8rem}}.page-hero{position:relative;background:var(--bg-dark);color:var(--white);padding:6rem 0 4rem;text-align:center}
  </style>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"></noscript>
  <link rel="icon" href="{{ '/images/favicon_monogram.svg' | relative_url }}" type="image/svg+xml">
  {% seo %}
</head>
<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
  /* ── Mobile nav toggle ───────────────────────────────── */
  (function () {
    var btn = document.querySelector('.nav-toggle');
    var nav = document.querySelector('.site-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      btn.classList.toggle('is-open', open);
      btn.setAttribute('aria-expanded', open);
    });
    nav.querySelectorAll('.site-nav__link').forEach(function (link) {
      link.addEventListener('click', function () {
        nav.classList.remove('is-open');
        btn.classList.remove('is-open');
        btn.setAttribute('aria-expanded', 'false');
      });
    });
  })();
  </script>

  <script>
  /* ── Hero slideshow ──────────────────────────────────── */
  (function () {
    var hero = document.getElementById('hero-slideshow');
    if (!hero) return;
    var slides = hero.querySelectorAll('.hero__slide');
    if (slides.length < 2) return;
    var idx = 0;
    setInterval(function () {
      slides[idx].classList.remove('is-active');
      idx = (idx + 1) % slides.length;
      slides[idx].classList.add('is-active');
      if (slides[idx].classList.contains('hero__slide--logo')) {
        hero.classList.add('hero--logo-active');
      } else {
        hero.classList.remove('hero--logo-active');
      }
    }, 5000);
  })();
  </script>

  <script>
  (function () {
    var drawer = document.getElementById('bio-drawer');
    if (!drawer) return;
    var cards = document.querySelectorAll('.person-card[data-bio]');
    var photo = drawer.querySelector('.bio-drawer__photo');
    var name  = drawer.querySelector('.bio-drawer__name');
    var role  = drawer.querySelector('.bio-drawer__role');
    var text  = drawer.querySelector('.bio-drawer__text');
    var more  = drawer.querySelector('.bio-drawer__more');
    var close = drawer.querySelector('.bio-drawer__close');
    var active = null;

    function openDrawer(card) {
      if (active) active.classList.remove('is-active');
      active = card;
      card.classList.add('is-active');
      photo.src = card.querySelector('img').src;
      photo.alt = card.querySelector('.person-card__name').textContent;
      name.textContent  = card.querySelector('.person-card__name').textContent;
      role.textContent  = card.querySelector('.person-card__role').textContent;
      text.textContent  = card.dataset.bio;
      if (more && card.dataset.url) {
        more.href = card.dataset.url;
        more.style.display = '';
      } else if (more) {
        more.style.display = 'none';
      }
      /* Move drawer right after the grid so it appears below all cards */
      card.closest('.team__grid').after(drawer);
      drawer.hidden = false;
      requestAnimationFrame(function () {
        drawer.classList.add('is-open');
      });
      setTimeout(function () {
        drawer.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 150);
    }

    function closeDrawer() {
      drawer.classList.remove('is-open');
      if (active) active.classList.remove('is-active');
      active = null;
      setTimeout(function () { drawer.hidden = true; }, 350);
    }

    cards.forEach(function (card) {
      card.addEventListener('click', function (e) {
        if (e.target.closest('a')) return; /* don't hijack link clicks */
        if (active === card) { closeDrawer(); return; }
        openDrawer(card);
      });
    });
    close.addEventListener('click', closeDrawer);
  })();
  </script>

</body>
</html>
